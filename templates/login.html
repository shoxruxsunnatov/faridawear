{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>faridawear</title>
  <meta name="description" content="">
  <meta name="keywords" content="">

  <!-- Favicons -->
  <link href="{% static 'assets/img/favicon.png' %}" rel="icon">
  <link href="{% static 'assets/img/apple-touch-icon.png' %}" rel="apple-touch-icon">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/aos/aos.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/glightbox/css/glightbox.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/swiper/swiper-bundle.min.css' %}" rel="stylesheet">

  <!-- Main CSS File -->
  <link href="{% static 'assets/css/main.css' %}" rel="stylesheet">
  <style>
    label {
      color: darkgray;
    }
    button {
      background-color: #3d566e;
      border: 1px solid #3d566e;
    }
    .main {
      position: relative;
      min-height: 100vh;
      overflow: hidden; /* keep the zoomed image contained */
    }

    .main::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("{% static 'assets/img/services.jpg' %}");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -1;
      animation: bgZoom 15s ease-in-out infinite;
      will-change: transform;
    }

    @keyframes bgZoom {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.15);
      }
      100% {
        transform: scale(1);
      }
    }

    .hero {
      background: transparent;
      backdrop-filter: blur(15px);
      position: relative;
      z-index: 1;
    }
    input {
      font-weight: bold;
    }
    label {
      color: black;
    }
    .sitename {
      font-weight: 900;
    }
  </style>

</head>

<body class="index-page">

  <header id="header" class="header d-flex align-items-center fixed-top">
    <div class="container-fluid position-relative d-flex align-items-center justify-content-between">

      <a href="/" class="logo d-flex align-items-center me-auto me-xl-0">
        <!-- Uncomment the line below if you also wish to use an image logo -->
        <!-- <img src="assets/img/logo.png" alt=""> -->
        <h1 class="sitename">faridawear</h1>
      </a>

      <nav id="navmenu" class="navmenu" style="display: none;">
        
        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>

      <a class="btn-getstarted fw-bold" href="/">Kirish</a>

    </div>
  </header>

  <main class="main">

    <!-- Hero Section -->
    <section id="hero" class="hero section dark-background">

      <!-- <img src="" alt="" data-aos="fade-in"> -->

      <div class="container" data-aos="fade-up" data-aos-delay="100">

        <div class="row gy-4">

          <div class="col-lg-6" style="margin: auto;">
            <p style="text-align: center;margin: 10px;font-size: xx-large;font-weight: bold;">Xush kelibsiz</p>
            <form id="login-form" onsubmit="return false;">
              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="floatingInput" placeholder="Login" name="username">
                <label for="floatingInput">Login</label>
              </div>
              <div class="form-floating">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password" name="password">
                <label for="floatingPassword">Parol</label>
              </div>
              <button id="submit_btn_loading" class="btn btn-primary fw-bold" type="button" style="margin: 10px auto auto auto;display: none;" disabled>
                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                Kuting...
              </button>
              <button id="submit_btn" class="btn btn-primary fw-bold" type="submit" style="margin: 10px auto auto auto;display: block;">
                 Kirish
                <i class="bi bi-box-arrow-in-right" style="vertical-align: middle;"></i>
              </button>
            </form>
          </div>
          <!-- Button trigger modal -->
          <button id="modal-trigger" type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal" style="display: none;">
            Launch demo modal
          </button>


        </div>

      </div>

    </section><!-- /Hero Section -->


  </main>

  


<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog ">
    <div class="modal-content">
      <div class="modal-header" style="border: 0;">
        <h6 class="modal-title fw-bold" id="exampleModalLabel" style="color: red;">Login yoki parol noto'g'ri</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
    </div>
  </div>
</div>


  <!-- Scroll Top -->
  <a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>

  <!-- Preloader -->
  <div id="preloader"></div>

  <script>
    let trigger = document.getElementById('modal-trigger')
    let login = document.getElementById('floatingInput')
    let password = document.getElementById('floatingPassword')
    let submit_btn = document.getElementById('submit_btn')
    let submit_btn_loading = document.getElementById('submit_btn_loading')

    submit_btn.addEventListener('click', async function(){
      submit_btn.style.display = 'none'
      submit_btn_loading.style.display = 'block'

      let form = new FormData()
      form.append('username', login.value)
      form.append('password', password.value)

      let request = await fetch('/api/login/', {
        method: 'POST',
        body: form
      })

      let response = await request.json()
      if (response.message == 'failed'){
        trigger.click()
      } else if (response.message == 'success'){
        location.href = '/'
      }

      submit_btn.style.display = 'block'
      submit_btn_loading.style.display = 'none'
    })
  </script>
  
  <!-- Vendor JS Files -->
  <script src="{% static 'assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
  <!-- <script src="{% static 'assets/vendor/php-email-form/validate.js' %}"></script> -->
  <script src="{% static 'assets/vendor/aos/aos.js' %}"></script>
  <script src="{% static 'assets/vendor/glightbox/js/glightbox.min.js' %}"></script>
  <script src="{% static 'assets/vendor/purecounter/purecounter_vanilla.js' %}"></script>
  <script src="{% static 'assets/vendor/imagesloaded/imagesloaded.pkgd.min.js' %}"></script>
  <script src="{% static 'assets/vendor/isotope-layout/isotope.pkgd.min.js' %}"></script>
  <script src="{% static 'assets/vendor/swiper/swiper-bundle.min.js' %}"></script>

  <!-- Main JS File -->
  <script src="{% static 'assets/js/main.js' %}"></script>

</body>

</html>
