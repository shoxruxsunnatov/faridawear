{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary package</title>
    <link href="{% static 'assets/img/favicon.png' %}" rel="icon">
    <link href="{% static 'bootstrap/bootstrap.min.css' %}" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <style>
        .logo {
            font-family: "Montserrat",  sans-serif;
            font-size: 24px;
        }
        .divider:after,
        .divider:before {
            content: "";
            flex: 1;
            height: 1px;
            background: #eee;
        }
            .h-custom {
            height: calc(100% - 73px);
        }
            @media (max-width: 450px) {
            .h-custom {
            height: 100%;
            }
        }
        body {
          background: rgb(44, 46, 49);
        }
        .contact {
          background: black;
          color: white;
          border: 2px solid rgb(44, 46, 49);
        }
        .page-name {
          font-family: Garamond, serif;
          color: white;
          font-size: xx-large;
          text-align: center;
          margin-top: 10px;
        }
        select {
          flex: 1;
        }
        .a-contact {
          margin: 0;
        }
        .time-passed {
        color: lightgray;
        font-size: smaller;
        position: absolute;
        right: 45px;
      }
      .accordion-item {
        margin-bottom: 2px;
      }
      .accordion-collapse {
        color: lightgray;
      }
      .fullscreen-image {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw!important;
        height: 100vh;
        object-fit: contain;
        z-index: 9999;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
    </style>
</head>
<body>
  {% include 'students/navbar.html' %}

  <section>
    <div class="container pt-1">
      <h1 class="text-body-emphasis text-light text-center" id="page_name">Package</h1>
      
      <div class="row">
        <div class="col-lg-4 mb-2">
          <a class="btn btn-secondary btn-sm" data-bs-toggle="collapse" href="#collapseExample" role="button" aria-expanded="false" aria-controls="collapseExample" style="width: 100%;border-radius: 5px 5px 0 0!important;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-info-circle-fill" viewBox="0 0 16 16" style="vertical-align: middle;margin-right: 5px">
              <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16m.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2"/>
            </svg>
            Details
          </a>
          <div class="collapse" id="collapseExample">
            <form id="form_register" method="post" onsubmit="return false">
              <ul class="list-group rounded-top" style="border-radius: 0 0 5px 5px!important">
                
                <li class="list-group-item justify-content-between align-items-start contact" data-bs-theme="dark">
                  <div class="row g-2">
                    <div class="col-sm-3">
                      <p class="text-muted mb-0">Name</p>
                    </div>
                    <div class="col-sm-9">
                      <p class="mb-0" id="package_title"></p>
                    </div>
                  </div>
                </li>
                <li class="list-group-item justify-content-between align-items-start contact">
                  <p class="text-secondary">By <span class="text-light" id="package_author"></span> at <small id="package_date_created"></small></p>
                </li>
              </ul>
            </form>
            <br>
          </div>
        </div>
        <div class="col-lg-8">
          <!-- 1 -->
          

            <div id="main"class="accordion accordion-flush mt-1">
                <!-- Don't touch -->

                

            </div>



        </div>
      </div>
    </div>
    <!-- Button trigger modal -->
    <button id="modal-trigger" type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal" style="display: none;">
      Launch demo modal
      </button>
      <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true" style="display: none;">
      <div class="modal-dialog ">
          <div class="modal-content">
          <div class="modal-header" style="border: 0;">
              <h6 class="modal-title" id="modal-text" style="color: orange;">Please, enter your number correctly.</h6>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          </div>
      </div>
      </div>

    <!-- Spinner -->
    <div id="spinner" class="d-flex justify-content-center align-items-center position-fixed top-0 start-0 w-100 h-100 bg-dark bg-opacity-50" style="display: none!important;">
    <div class="spinner-grow text-light" style="width: 3rem; height: 3rem;" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
    </div>

  </section>


  <script src="{% static 'bootstrap/popper.min.js' %}" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
  <script src="{% static 'bootstrap/bootstrap.min.js' %}" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
  <script>
    let page_state = 0

    let main = document.getElementById('main')

    let page_name = document.getElementById('page_name')
    let package_title = document.getElementById('package_title')
    let package_author = document.getElementById('package_author')
    let package_date_created = document.getElementById('package_date_created')

    let vocabularies = {}
    const package_id = location.pathname.split('/')[3]

    function clean_text(text) {
      return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
    }

    function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        // Generate a random index from 0 to i
        const j = Math.floor(Math.random() * (i + 1));
        
        // Swap elements at indices i and j
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
    }

    function formatDate(date) {
      date = new Date(date)
      const hours = (date.getHours() % 12 || 12).toString().padStart(2, '0'); // Convert to 12-hour format
      const minutes = date.getMinutes().toString().padStart(2, '0'); // Ensure two-digit minutes
      const ampm = date.getHours() >= 12 ? 'PM' : 'AM';
      const month = date.toLocaleString('en-US', { month: 'long' });
      const day = date.getDate();
      const year = date.getFullYear();

      return `${hours}:${minutes} ${ampm}, ${month} ${day}, ${year}`;
    }

    function spinner(display){
    let spinner_element = document.getElementById('spinner')
    switch (display){
    case true:
        spinner_element.setAttribute('style', 'display: block')
        break
    case false:
        spinner_element.setAttribute('style', 'display: none!important')
        break
    }
    }

    function notification(message, color){
    let modal_trigger = document.getElementById('modal-trigger')
    let modal_text = document.getElementById('modal-text')

    modal_text.style.color = color
    modal_text.innerText = message
    modal_trigger.click()
    }


    async function load_package(){
        spinner(true)

        let request = await fetch(`/api/dictionary/packages/${package_id}/`)
        let response = await request.json()
        exam = response

        page_name.innerText = clean_text(response.title)
        package_author.innerText = response.author ? clean_text(response.author) : "platform"
        package_date_created.innerText = formatDate(response.date_created)
        package_title.innerHTML = clean_text(response.title)
        document.getElementsByTagName("title")[0].innerText = clean_text(response.title)

        if (page_state > 0){
          spinner(false)
        }
        page_state ++
    }
    load_package()

    async function load_vocabularies(){
        spinner(true)

        let request = await fetch(`/api/dictionary/packages/${package_id}/vocabularies/`)
        let response = await request.json()

        vocabularies = response
        main.innerHTML = ''

        for (let i = 0; i < response.length; i++){

            vocabulary = response[i]

            let image = ""
            if (vocabulary.image){
              image = `
              <hr>
              <div class="row">
                  <p class="text-muted mb-1">Image</p>
                  <img class="w-25 d-block m-auto rounded" src="${vocabulary.image}">
              </div>
              `
            }

            main.innerHTML += `
            <div id="v${vocabulary.id}" class="accordion-item bg-dark text-light rounded-4 border-dark">
                <h2 class="accordion-header" id="i${i}">
                    <button class="accordion-button collapsed text-light rounded-4" style="background: black;" type="button" data-bs-toggle="collapse" data-bs-target="#body${i}" aria-expanded="false" aria-controls="body${i}">
                    <span class="me-2 badge text-bg-secondary">${i + 1}</span>
                    ${clean_text(vocabulary.text)}
                    </button>
                </h2>
                <div id="body${i}" class="accordion-collapse collapse rounded-4" aria-labelledby="i${i}" data-bs-parent="#main">
                    <div class="accordion-body pt-1">
                      <div class="card-body mt-3">
                          <div class="row">
                              <div class="col-sm-3">
                              <p class="text-muted mb-0">Uzbek</p>
                              </div>
                              <div class="col-sm-9">
                              <p class="mb-0 fw-bold text-success">${clean_text(vocabulary.translation)}</p>
                              </div>
                          </div>
                          <hr>
                          <div class="row">
                              <div class="col-sm-3">
                              <p class="text-muted mb-0">English</p>
                              </div>
                              <div class="col-sm-9">
                              <p class="text-primary mb-0 fw-bold">${clean_text(vocabulary.text)} <span class="align-text-bottom text-light">(${vocabulary.category})</span></p>
                              </div>
                          </div>
                          <hr>
                          <div class="row">
                              <div class="col-sm-3">
                              <p class="text-muted mb-0">Description</p>
                              </div>
                              <div class="col-sm-9">
                              <p class="mb-0 fw-bold">${clean_text(vocabulary.description)}</p>
                              </div>
                          </div>
                          ${image}
                          <div class="row d-none">
                              <div class="col-sm-3">
                              <p class="text-muted mb-0">Learn more</p>
                              </div>
                              <div class="col-sm-9">
                              <a href="${vocabulary.id}/" class="btn btn-success">
                                <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bi bi-play-fill" viewBox="0 0 16 16">
                                  <path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393"/>
                                </svg>
                                Learn
                              </a>
                              </div>
                          </div>
                          <hr>
                          <div class="row">
                              <div class="col-sm-3">
                              <small class="text-muted mb-0">By <span class="text-light">${vocabulary.author ? clean_text(vocabulary.author) : "platform"}</span></small>
                              </div>
                              <div class="col-sm-9">
                              <small class="text-muted mb-0">At ${formatDate(vocabulary.date_created)}</small>
                              </div>
                          </div>
                        </div>

                    </div>
                </div>
            </div>
            `
        }
        let images = document.getElementsByTagName('img')
        for (let i = 0; i < images.length; i++){
          let image = images[i]
          image.addEventListener('click', () => {
            if (image.classList.contains('w-25')){
                image.classList.remove('w-25')
                image.classList.add('fullscreen-image')
            }else{
                image.classList.add('w-25')
                image.classList.remove('fullscreen-image')
            }
          })
        }

        if (page_state > 0){
          spinner(false)
        }
        page_state ++
    }
    load_vocabularies()
    

  </script>
</body>
</html>
